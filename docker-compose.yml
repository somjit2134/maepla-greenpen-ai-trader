version: "3.9"

services:
  maepla-trader:
    build: .
    container_name: maepla-green-pen-ai
    volumes:
      - ./config.yaml:/app/config.yaml:ro
      - ./data:/app/data
      - ./logs:/app/logs
    environment:
      - PYTHONPATH=/app
      - TZ=Asia/Bangkok
    command: ["/monitor", "--simulate", "--interval", "60"]
    restart: unless-stopped

  maepla-backtest:
    build: .
    container_name: maepla-backtest
    volumes:
      - ./config.yaml:/app/config.yaml:ro
      - ./data:/app/data
      - ./logs:/app/logs
    command: ["/backtest", "--simulate", "--periods", "1000"]
    profiles:
      - backtest

  maepla-test:
    build: .
    container_name: maepla-test
    volumes:
      - ./config.yaml:/app/config.yaml:ro
    command: ["-m", "pytest", "tests/", "-v"]
    profiles:
      - test
